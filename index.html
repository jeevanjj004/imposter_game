<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#15101f">
<title>Imposter Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#120d1c;
    --bg-mid:#241a3a;
    --bg-glow:#3d2463;
    --accent-gold:#f0b347;
    --accent-gold-soft:#f8d28a;
    --accent-gold-dim:rgba(240,179,71,0.18);
    --accent-red:#e6435a;
    --accent-red-soft:#ff8a96;
    --accent-red-dim:rgba(230,67,90,0.18);
    --accent-teal:#3fd8c8;
    --accent-teal-soft:#7eeee4;
    --accent-teal-dim:rgba(63,216,200,0.15);
    --glass-bg:rgba(255,255,255,0.055);
    --glass-bg-strong:rgba(255,255,255,0.09);
    --glass-border:rgba(255,255,255,0.14);
    --text-primary:#f5f1ea;
    --text-secondary:rgba(245,241,234,0.62);
    --text-faint:rgba(245,241,234,0.38);
    --display:'Bebas Neue', sans-serif;
    --body:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100dvh;
    font-family:var(--body);
    color:var(--text-primary);
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--bg-glow) 0%, transparent 60%),
      linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-deep) 100%);
    background-attachment:fixed;
    position:relative;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .bg-blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:0.35;z-index:0;pointer-events:none;}
  .bg-blob.gold{width:260px;height:260px;background:var(--accent-gold);top:6%;right:-10%;animation:blobDrift 18s ease-in-out infinite alternate;}
  .bg-blob.red{width:220px;height:220px;background:var(--accent-red);bottom:4%;left:-12%;animation:blobDrift 22s ease-in-out infinite alternate-reverse;}
  @keyframes blobDrift{from{transform:translate(0,0) scale(1);}to{transform:translate(24px,-26px) scale(1.12);}}
  .app-shell{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100dvh;padding:28px 22px calc(36px + env(safe-area-inset-bottom));display:flex;flex-direction:column;}
  .screen{flex:1;display:flex;flex-direction:column;}
  .screen-center{justify-content:center;}
  .screen-enter{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--text-secondary);font-family:var(--body);font-size:14px;font-weight:600;padding:8px 4px;cursor:pointer;letter-spacing:0.02em;}
  .back-btn:hover{color:var(--text-primary);}
  .round-pill{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--accent-gold-soft);background:var(--accent-gold-dim);border:1px solid rgba(240,179,71,0.3);padding:6px 12px;border-radius:100px;white-space:nowrap;}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:0.16em;color:var(--accent-gold-soft);text-transform:uppercase;margin:0 0 10px;}
  .eyebrow.teal{color:var(--accent-teal-soft);}
  h1.display,h2.display,h3.display{font-family:var(--display);font-weight:400;letter-spacing:0.02em;line-height:0.95;margin:0;}
  .title-hero{font-size:64px;}
  .title-screen{font-size:38px;margin-bottom:8px;}
  .title-reveal{font-size:46px;word-break:break-word;}
  p.subtitle{color:var(--text-secondary);font-size:15.5px;line-height:1.5;margin:0;}
  .text-center{text-align:center;}
  .glass-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:26px;}
  .btn{font-family:var(--body);border-radius:100px;border:none;cursor:pointer;font-weight:600;font-size:16px;padding:18px 22px;width:100%;transition:transform .15s ease,box-shadow .15s ease;display:flex;align-items:center;justify-content:center;gap:8px;text-align:center;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:linear-gradient(135deg,var(--accent-gold-soft),var(--accent-gold));color:#241405;box-shadow:0 8px 24px rgba(240,179,71,0.28);}
  .btn-primary:hover{box-shadow:0 10px 30px rgba(240,179,71,0.4);}
  .btn-secondary{background:var(--glass-bg-strong);border:1px solid var(--glass-border);color:var(--text-primary);}
  .btn-secondary:hover{border-color:rgba(255,255,255,0.26);}
  .btn-teal{background:linear-gradient(135deg,var(--accent-teal-soft),var(--accent-teal));color:#0a2420;box-shadow:0 8px 24px rgba(63,216,200,0.22);}
  .btn-teal:hover{box-shadow:0 10px 30px rgba(63,216,200,0.34);}
  .btn-text{background:none;border:none;color:var(--text-secondary);font-family:var(--body);font-size:14px;font-weight:600;cursor:pointer;padding:10px;width:100%;}
  .btn-text:hover{color:var(--text-primary);}
  .btn-stack{display:flex;flex-direction:column;gap:14px;}
  .mode-btn{flex-direction:column;align-items:flex-start;text-align:left;padding:20px 22px;}
  .mode-btn .mode-title{font-size:17px;font-weight:700;}
  .mode-btn .mode-desc{font-size:13px;font-weight:400;margin-top:4px;opacity:0.8;}
  .mode-btn.btn-primary .mode-desc{color:#3a2308;opacity:0.85;}
  .mode-btn.btn-secondary .mode-desc{color:var(--text-secondary);}
  .mode-btn.btn-teal .mode-desc{color:#0a2420;opacity:0.85;}
  .hero-icon{display:flex;justify-content:center;margin-bottom:18px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-family:var(--mono);font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
  input[type="text"],input[type="number"]{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:15px 16px;font-family:var(--body);font-size:16px;color:var(--text-primary);outline:none;transition:border-color .15s,background .15s;}
  input::placeholder{color:var(--text-faint);}
  input:focus{border-color:var(--accent-gold);background:rgba(255,255,255,0.08);}
  input.input-error{border-color:var(--accent-red);}
  :focus-visible{outline:2px solid var(--accent-gold-soft);outline-offset:3px;}
  .error-text{color:var(--accent-red-soft);font-size:13.5px;margin:-4px 0 14px;font-weight:500;}
  /* Tabs */
  .tab-row{display:flex;gap:5px;margin-bottom:22px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:100px;padding:4px;}
  .tab-btn{flex:1;font-family:var(--body);font-size:13.5px;font-weight:600;padding:10px 8px;border:none;border-radius:100px;cursor:pointer;color:var(--text-secondary);background:none;transition:background .15s,color .15s;}
  .tab-btn.active{background:var(--accent-gold);color:#241405;}
  .tab-btn.active-teal{background:var(--accent-teal);color:#0a2420;}
  /* Word pills */
  .word-pill-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
  .word-pill{display:flex;align-items:center;gap:8px;background:var(--glass-bg-strong);border:1px solid var(--glass-border);border-radius:100px;padding:8px 8px 8px 16px;font-size:14px;}
  .word-pill button{background:rgba(230,67,90,0.18);border:none;color:var(--accent-red-soft);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .word-pill button:hover{background:rgba(230,67,90,0.32);}
  /* Pair pills */
  .pair-pill-list{display:flex;flex-direction:column;gap:8px;margin-top:18px;}
  .pair-pill{display:flex;align-items:center;gap:10px;background:var(--glass-bg-strong);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:12px 10px 12px 16px;font-size:14px;}
  .pair-pill-words{flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .pair-real{color:var(--text-primary);font-weight:600;}
  .pair-arrow{color:var(--text-faint);font-size:12px;}
  .pair-decoy{color:var(--accent-teal-soft);font-weight:600;}
  .pair-pill-del{background:rgba(230,67,90,0.18);border:none;color:var(--accent-red-soft);min-width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .pair-pill-del:hover{background:rgba(230,67,90,0.32);}
  .add-pair-form{display:flex;flex-direction:column;gap:10px;}
  .pair-input-row{display:flex;gap:8px;}
  .pair-input-row input{flex:1;min-width:0;}
  .empty-state{color:var(--text-faint);font-size:14px;padding:18px 0;text-align:center;}
  .add-word-row{display:flex;gap:10px;}
  .add-word-row input{flex:1;}
  .add-word-row .btn{width:auto;padding:15px 22px;}
  /* Role card */
  .role-card{border-radius:var(--radius-lg);padding:40px 26px;text-align:center;margin-bottom:18px;border:1px solid var(--glass-border);background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .role-card.revealed{animation:cardFlipIn .55s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes cardFlipIn{from{transform:rotateY(90deg) scale(.94);opacity:0;}to{transform:rotateY(0) scale(1);opacity:1;}}
  .role-card.normal-reveal{border-color:rgba(240,179,71,0.4);background:linear-gradient(180deg,rgba(240,179,71,0.1),rgba(240,179,71,0.02));}
  .role-card.imposter-reveal{border-color:rgba(240,179,71,0.4);background:linear-gradient(180deg,rgba(240,179,71,0.1),rgba(240,179,71,0.02));animation:cardFlipIn .55s cubic-bezier(.2,.8,.2,1) both;}
  .role-card.similar-reveal{border-color:rgba(240,179,71,0.4);background:linear-gradient(180deg,rgba(240,179,71,0.1),rgba(240,179,71,0.02));animation:cardFlipIn .55s cubic-bezier(.2,.8,.2,1) both;}
  .role-card .role-label{font-family:var(--mono);font-size:12px;letter-spacing:0.14em;color:var(--text-faint);text-transform:uppercase;margin-bottom:14px;}
  .role-card .role-word{font-family:var(--display);font-size:42px;color:var(--accent-gold-soft);line-height:1.05;word-break:break-word;}
  .role-card .role-word.teal{color:var(--accent-gold-soft);}
  .role-card .role-imposter-title{font-family:var(--display);font-size:34px;color:var(--accent-gold-soft);line-height:1.05;}
  .role-card .role-similar-title{font-family:var(--display);font-size:28px;color:var(--accent-gold-soft);line-height:1.05;margin-top:14px;}
  .role-card .role-hint{color:var(--text-secondary);font-size:14px;margin-top:14px;line-height:1.5;}
  .pass-icon{font-size:38px;margin-bottom:10px;opacity:0.8;}
  .deciding-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:22px;}
  .spinner-ring{width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,0.12);border-top-color:var(--accent-gold);border-right-color:var(--accent-red);animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .deciding-label{font-family:var(--mono);font-size:13px;letter-spacing:0.1em;color:var(--text-secondary);text-transform:uppercase;}
  .modal-overlay{position:fixed;inset:0;background:rgba(10,7,16,0.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;animation:fadeIn .2s ease both;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-card{background:var(--bg-mid);border:1px solid var(--glass-border);border-radius:var(--radius-lg);padding:28px;max-width:360px;width:100%;text-align:center;animation:fadeUp .25s cubic-bezier(.16,1,.3,1) both;}
  .modal-card p{color:var(--text-primary);font-size:16px;margin:0 0 22px;line-height:1.5;}
  .modal-actions{display:flex;gap:12px;}
  .modal-actions .btn{padding:14px;font-size:15px;}
  .result-card{border-radius:var(--radius-lg);border:1px solid var(--glass-border);padding:26px;text-align:center;margin-bottom:14px;}
  .result-card.word{background:linear-gradient(180deg,rgba(240,179,71,0.12),rgba(240,179,71,0.02));border-color:rgba(240,179,71,0.35);}
  .result-card.imposter{background:linear-gradient(180deg,rgba(230,67,90,0.14),rgba(230,67,90,0.03));border-color:rgba(230,67,90,0.4);}
  .result-card .result-label{font-family:var(--mono);font-size:11.5px;letter-spacing:0.12em;color:var(--text-faint);text-transform:uppercase;margin-bottom:10px;}
  .result-card.word .result-value{font-family:var(--display);font-size:38px;color:var(--accent-gold-soft);}
  .result-card.imposter .result-value{font-family:var(--display);font-size:38px;color:var(--accent-red-soft);}
  .result-divider{border:none;border-top:1px solid var(--glass-border);margin:14px 0;}
  .result-decoy-label{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;color:var(--text-faint);text-transform:uppercase;margin-bottom:6px;margin-top:14px;}
  .result-decoy-value{font-family:var(--display);font-size:26px;color:var(--accent-teal-soft);}
  .step-dots{display:flex;gap:6px;justify-content:center;margin-top:16px;}
  .step-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.18);}
  .step-dot.done{background:var(--accent-gold);}
  .step-dot.current{background:var(--accent-gold-soft);box-shadow:0 0 0 3px rgba(240,179,71,0.25);}
  .spacer-grow{flex:1;}
  .footer-tag{text-align:center;color:var(--text-faint);font-size:12.5px;margin-top:28px;font-family:var(--mono);letter-spacing:0.04em;}
  .info-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent-teal-dim);border:1px solid rgba(63,216,200,0.3);border-radius:100px;padding:5px 12px;font-family:var(--mono);font-size:11px;letter-spacing:0.08em;color:var(--accent-teal-soft);margin-bottom:14px;}
  @media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;}}
  @media(max-width:360px){.title-hero{font-size:54px;}.role-card .role-word{font-size:34px;}}
</style>
</head>
<body>
<div class="bg-blob gold"></div>
<div class="bg-blob red"></div>
<div class="app-shell" id="app"></div>
<script>
(function(){
  "use strict";

  var BUILTIN_WORDS = [
    "Pen","Wedding","Football","Pizza","Doctor","Beach","Birthday Cake","Laptop",
    "Mountain","Coffee","Airport","Bicycle","Library","Camera","Umbrella","Guitar",
    "Hospital","Zoo","Restaurant","Movie Theater","Snow","Desert","Submarine",
    "Castle","Robot","Pirate","Astronaut","Volcano","Waterfall","Magician"
  ];

  var BUILTIN_PAIRS = [
    {word:"Gym",decoy:"Bathroom"},
    {word:"Hospital",decoy:"Expensive Hotel"},
    {word:"WiFi",decoy:"Oxygen"},
    {word:"College",decoy:"Prison"},
    {word:"Office",decoy:"Jail"},
    {word:"Kerala Rain",decoy:"Swimming Pool"},
    {word:"Chaya Kada",decoy:"Parliament"},
    {word:"Lungi",decoy:"Skirt"},
    {word:"Coconut",decoy:"Head"},
    {word:"Neighbor",decoy:"Spy"},
    {word:"Wedding",decoy:"Trap"},
    {word:"First Night",decoy:"Birthday"},
    {word:"Toothbrush",decoy:"Toilet Brush"},
    {word:"Perfume",decoy:"Mosquito Spray"},
    {word:"Slipper",decoy:"Weapon"},
    {word:"Pillow",decoy:"Blanket"},
    {word:"Mosquito",decoy:"Terrorist"},
    {word:"Rat",decoy:"Roommate"},
    {word:"Tea",decoy:"Blood"},
    {word:"Samosa",decoy:"Dosa"},
    {word:"Alcohol",decoy:"Mineral Water"},
    {word:"Power Cut",decoy:"Alarm"},
    {word:"Hair",decoy:"Coir"},
    {word:"Bed",decoy:"Wedding"},
    {word:"Teacher",decoy:"Scientist"},
    {word:"Neighbour",decoy:"Relative"},
    {word:"Ice",decoy:"Salt"},
    {word:"Road",decoy:"Railway"},
    {word:"Film Theatre",decoy:"Marriage Hall"},
    {word:"Banana",decoy:"Mango"},
    {word:"Socks",decoy:"Gloves"},
    {word:"Cap",decoy:"Helmet"},
    {word:"Balloon",decoy:"Rubber Band"},
    {word:"Bearded",decoy:"Hair"},
    {word:"Nose",decoy:"Kundi"},
    {word:"Rocket",decoy:"Firework"},
    {word:"Wedding",decoy:"First Night"}
  ];

  var STORAGE_KEY       = "imposterGameCustomWords";
  var STORAGE_KEY_PAIRS = "imposterGameWordPairs";

  function loadCustomWords(){
    try{ var r=localStorage.getItem(STORAGE_KEY); var p=r?JSON.parse(r):[]; return Array.isArray(p)?p:[]; }catch(e){ return []; }
  }
  function saveCustomWords(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.customWords)); }catch(e){}
  }
  function loadCustomPairs(){
    try{ var r=localStorage.getItem(STORAGE_KEY_PAIRS); var p=r?JSON.parse(r):[]; return Array.isArray(p)?p:[]; }catch(e){ return []; }
  }
  function saveCustomPairs(){
    try{ localStorage.setItem(STORAGE_KEY_PAIRS, JSON.stringify(state.customPairs)); }catch(e){}
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g,function(c){
      return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  var state = {
    screen: 'home',
    customWords: loadCustomWords(),
    customPairs: loadCustomPairs(),
    mode: null,
    manageTab: 'words',
    setup: {step:'count',count:'',names:[],error:''},
    players: [],
    playerCount: 0,
    pool: [],
    pairPool: [],
    usedWords: new Set(),
    roundNumber: 0,
    starterIndex: 0,
    revealOrder: [],
    revealStep: 0,
    revealed: false,
    currentWord: '',
    currentDecoy: '',
    imposterIndex: -1,
    showSkipConfirm: false,
    newWordError: '',
    newWordValue: '',
    newPairWordValue: '',
    newPairDecoyValue: '',
    newPairError: ''
  };

  /* ---- Pool / word logic ---- */
  function buildPool(){
    if(state.mode === 'default'){
      state.pool = BUILTIN_WORDS.concat(state.customWords);
      state.pairPool = [];
    } else if(state.mode === 'custom'){
      state.pool = state.customWords.slice();
      state.pairPool = [];
    } else {
      state.pool = [];
      state.pairPool = BUILTIN_PAIRS.concat(state.customPairs);
    }
  }

  function pickWord(){
    if(state.mode === 'similar'){
      var avail = state.pairPool.filter(function(p){ return !state.usedWords.has(p.word); });
      if(avail.length === 0){
        state.usedWords.clear();
        avail = state.pairPool.slice();
      }
      var pair = avail[Math.floor(Math.random() * avail.length)];
      state.usedWords.add(pair.word);
      state.currentDecoy = pair.decoy;
      return pair.word;
    } else {
      var avail2 = state.pool.filter(function(w){ return !state.usedWords.has(w); });
      if(avail2.length === 0){
        state.usedWords.clear();
        avail2 = state.pool.slice();
      }
      var word = avail2[Math.floor(Math.random() * avail2.length)];
      state.usedWords.add(word);
      state.currentDecoy = '';
      return word;
    }
  }

  function pickImposterIndex(){
    return Math.floor(Math.random() * state.playerCount);
  }

  function computeRevealOrder(starter){
    var order = [];
    for(var i=0;i<state.playerCount;i++) order.push((starter+i)%state.playerCount);
    return order;
  }

  function generateRound(){
    state.currentWord = pickWord();
    state.imposterIndex = pickImposterIndex();
    state.revealOrder = computeRevealOrder(state.starterIndex);
    state.revealStep = 0;
    state.revealed = false;
    showDecidingThenReveal();
  }

  function regenerateForSkip(){
    state.currentWord = pickWord();
    state.imposterIndex = pickImposterIndex();
    state.revealOrder = computeRevealOrder(state.starterIndex);
    state.revealStep = 0;
    state.revealed = false;
    state.screen = 'reveal';
    render();
  }

  function showDecidingThenReveal(){
    state.screen = 'deciding';
    render();
    setTimeout(function(){ state.screen='reveal'; render(); }, 1000);
  }

  /* ---- Actions ---- */
  function goHome(){
    state.screen='home'; state.mode=null; state.players=[];
    state.playerCount=0; state.setup={step:'count',count:'',names:[],error:''};
    state.showSkipConfirm=false; render();
  }

  function playDefaultMode(){ state.mode='default'; state.setup={step:'count',count:'',names:[],error:''}; state.screen='setup'; render(); }
  function playCustomMode(){
    if(state.customWords.length===0){ state.screen='customEmptyWarning'; render(); return; }
    state.mode='custom'; state.setup={step:'count',count:'',names:[],error:''}; state.screen='setup'; render();
  }
  function playSimilarMode(){ state.mode='similar'; state.setup={step:'count',count:'',names:[],error:''}; state.screen='setup'; render(); }

  function manageWords(tab){
    state.manageTab = tab || 'words';
    state.newWordError=''; state.newWordValue='';
    state.newPairError=''; state.newPairWordValue=''; state.newPairDecoyValue='';
    state.screen='manageWords'; render();
  }

  function setManageTab(tab){
    state.manageTab = tab;
    state.newWordError=''; state.newPairError=''; render();
  }

  function addCustomWord(){
    var input = document.getElementById('new-word-input');
    var val = input ? input.value.trim() : '';
    if(!val){ state.newWordError='Enter a word first.'; state.newWordValue=input?input.value:''; render(); return; }
    if(state.customWords.some(function(w){ return w.toLowerCase()===val.toLowerCase(); })){
      state.newWordError='"'+val+'" is already on your list.'; state.newWordValue=input.value; render(); return;
    }
    state.customWords.push(val); saveCustomWords();
    state.newWordError=''; state.newWordValue=''; render();
  }

  function removeCustomWord(word){
    state.customWords=state.customWords.filter(function(w){ return w!==word; });
    saveCustomWords(); render();
  }

  function addCustomPair(){
    var wi = document.getElementById('pair-word-input');
    var di = document.getElementById('pair-decoy-input');
    var wval = wi ? wi.value.trim() : '';
    var dval = di ? di.value.trim() : '';
    if(!wval || !dval){
      state.newPairError='Both fields are required.';
      state.newPairWordValue = wi ? wi.value : '';
      state.newPairDecoyValue = di ? di.value : '';
      render(); return;
    }
    if(wval.toLowerCase()===dval.toLowerCase()){
      state.newPairError='The two words must be different.';
      state.newPairWordValue=wi.value; state.newPairDecoyValue=di.value; render(); return;
    }
    var dup = state.customPairs.some(function(p){ return p.word.toLowerCase()===wval.toLowerCase(); });
    if(dup){
      state.newPairError='"'+wval+'" already has a pair.';
      state.newPairWordValue=wi.value; state.newPairDecoyValue=di.value; render(); return;
    }
    state.customPairs.push({word:wval, decoy:dval}); saveCustomPairs();
    state.newPairError=''; state.newPairWordValue=''; state.newPairDecoyValue=''; render();
  }

  function removeCustomPair(idx){
    state.customPairs.splice(idx,1); saveCustomPairs(); render();
  }

  function setupContinue(){
    var ci = document.getElementById('player-count-input');
    var raw = ci ? ci.value : '';
    var val = parseInt(raw,10);
    if(!val||isNaN(val)||val<3){ state.setup.count=raw; state.setup.error='You need at least 3 players.'; render(); return; }
    state.setup.count=val; state.setup.names=new Array(val).fill(''); state.setup.step='names'; state.setup.error=''; render();
  }

  function setupEditCount(){
    var inputs = document.querySelectorAll('.player-name-input');
    state.setup.names=Array.prototype.map.call(inputs,function(i){ return i.value; });
    state.setup.step='count'; state.setup.error=''; render();
  }

  function startGameClick(){
    var inputs = document.querySelectorAll('.player-name-input');
    var names = Array.prototype.map.call(inputs,function(i){ return i.value; });
    state.setup.names=names;
    var trimmed = names.map(function(n){ return n.trim(); });
    if(trimmed.some(function(n){ return n===''; })){ state.setup.error='All player names are required.'; render(); return; }
    state.players=trimmed; state.playerCount=trimmed.length;
    buildPool(); state.usedWords=new Set(); state.roundNumber=1; state.starterIndex=0;
    generateRound();
  }

  function showRole(){
    state.revealed=true;
    if(navigator.vibrate){ try{ navigator.vibrate(35); }catch(e){} }
    render();
  }

  function hideAndPass(){
    state.revealStep++;
    if(state.revealStep>=state.playerCount){ state.screen='discussion'; }
    else { state.revealed=false; }
    render();
  }

  function skipWordClick(){ state.showSkipConfirm=true; render(); }
  function confirmSkipYes(){ state.showSkipConfirm=false; regenerateForSkip(); }
  function confirmSkipNo(){ state.showSkipConfirm=false; render(); }
  function revealImposterClick(){ state.screen='result'; render(); }
  function nextRoundClick(){
    state.starterIndex=(state.starterIndex+1)%state.playerCount;
    state.roundNumber++; generateRound();
  }

  /* ---- Templates ---- */
  function maskIconSvg(){
    return '<svg width="92" height="92" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<defs>' +
        '<linearGradient id="gMask" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8d28a"/><stop offset="1" stop-color="#f0b347"/></linearGradient>' +
        '<linearGradient id="rMask" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8a96"/><stop offset="1" stop-color="#e6435a"/></linearGradient>' +
      '</defs>' +
      '<path d="M60 8C30 8 12 26 12 52c0 28 20 46 36 58a4 4 0 0 0 4 0c2-1.4 4-3 6-4.6V8.4C56 8.2 58 8 60 8Z" fill="url(#gMask)"/>' +
      '<path d="M60 8c30 0 48 18 48 44 0 28-20 46-36 58a4 4 0 0 1-4 0c-2-1.4-4-3-6-4.6V8.4C64 8.2 62 8 60 8Z" fill="url(#rMask)"/>' +
      '<ellipse cx="38" cy="50" rx="9" ry="11" fill="#15101f"/>' +
      '<ellipse cx="82" cy="50" rx="9" ry="11" fill="#15101f"/>' +
      '<path d="M44 78c6 6 12 9 16 9s10-3 16-9" stroke="#15101f" stroke-width="4" stroke-linecap="round" fill="none"/>' +
    '</svg>';
  }

  function topBar(showRound){
    var round = showRound ? '<span class="round-pill">ROUND '+state.roundNumber+'</span>' : '<span></span>';
    return '<div class="top-bar"><button class="back-btn" onclick="IG.goHome()">&#8249; Home</button>'+round+'</div>';
  }

  function renderHome(){
    var wc = state.customWords.length;
    var pc = state.customPairs.length;
    var manageLabel = '&#9998; Manage Words' + (wc||pc ? ' ('+(wc+pc)+')' : '');
    return '<div class="screen screen-center screen-enter">' +
      '<div class="hero-icon">'+maskIconSvg()+'</div>' +
      '<div class="text-center" style="margin-bottom:32px;">' +
        '<div class="eyebrow" style="text-align:center;">A PARTY GAME FOR GROUPS</div>' +
        '<h1 class="display title-hero">IMPOSTER</h1>' +
        '<p class="subtitle" style="margin-top:10px;">One word. One liar. Pass the phone and find out who.</p>' +
      '</div>' +
      '<div class="btn-stack">' +
        '<button class="btn btn-primary mode-btn" onclick="IG.playDefaultMode()">' +
          '<span class="mode-title">Default Mode</span>' +
          '<span class="mode-desc">Classic word pack + your custom words</span>' +
        '</button>' +
        '<button class="btn btn-secondary mode-btn" onclick="IG.playCustomMode()">' +
          '<span class="mode-title">Custom Mode</span>' +
          '<span class="mode-desc">Only your own custom words</span>' +
        '</button>' +
        '<button class="btn btn-teal mode-btn" onclick="IG.playSimilarMode()">' +
          '<span class="mode-title">Similar Word Mode ✦</span>' +
          '<span class="mode-desc">Imposter gets a different but related word — harder to catch!</span>' +
        '</button>' +
        '<button class="btn-text" onclick="IG.manageWords()">'+manageLabel+'</button>' +
      '</div>' +
      '<div class="footer-tag">PASS THE PHONE &middot; TRUST NO ONE</div>' +
    '</div>';
  }

  function renderManageWords(){
    var isWords = state.manageTab === 'words';
    var tabContent;
    if(isWords){
      var listHtml;
      if(state.customWords.length===0){
        listHtml = '<div class="empty-state">No custom words yet. Add your first one above.</div>';
      } else {
        listHtml = '<div class="word-pill-list">'+state.customWords.map(function(w){
          return '<div class="word-pill"><span>'+escapeHtml(w)+'</span>' +
            '<button class="remove-word-btn" data-word="'+escapeHtml(w)+'" aria-label="Remove '+escapeHtml(w)+'">&times;</button></div>';
        }).join('')+'</div>';
      }
      tabContent =
        '<div class="add-word-row" style="margin-bottom:8px;">' +
          '<input type="text" id="new-word-input" placeholder="e.g. Adipoli" value="'+escapeHtml(state.newWordValue||'')+'" onkeydown="if(event.key===\'Enter\'){IG.addCustomWord();}">' +
          '<button class="btn btn-primary" style="width:auto;" onclick="IG.addCustomWord()">Add</button>' +
        '</div>' +
        (state.newWordError ? '<div class="error-text">'+escapeHtml(state.newWordError)+'</div>' : '') +
        listHtml;
    } else {
      var pairListHtml;
      if(state.customPairs.length===0){
        pairListHtml = '<div class="empty-state">No custom pairs yet. Built-in pairs are always used in Similar Mode.</div>';
      } else {
        pairListHtml = '<div class="pair-pill-list">'+state.customPairs.map(function(p,i){
          return '<div class="pair-pill">' +
            '<div class="pair-pill-words">' +
              '<span class="pair-real">'+escapeHtml(p.word)+'</span>' +
              '<span class="pair-arrow">&#8594;</span>' +
              '<span class="pair-decoy">'+escapeHtml(p.decoy)+'</span>' +
            '</div>' +
            '<button class="pair-pill-del remove-pair-btn" data-index="'+i+'" aria-label="Remove">&times;</button>' +
          '</div>';
        }).join('')+'</div>';
      }
      tabContent =
        '<div class="add-pair-form">' +
          '<div class="pair-input-row">' +
            '<input type="text" id="pair-word-input" placeholder="Real word (e.g. Pen)" value="'+escapeHtml(state.newPairWordValue||'')+'">' +
            '<input type="text" id="pair-decoy-input" placeholder="Imposter\'s word (e.g. Pencil)" value="'+escapeHtml(state.newPairDecoyValue||'')+'">' +
          '</div>' +
          '<button class="btn btn-teal" onclick="IG.addCustomPair()">Add Pair</button>' +
        '</div>' +
        (state.newPairError ? '<div class="error-text" style="margin-top:8px;">'+escapeHtml(state.newPairError)+'</div>' : '') +
        pairListHtml;
    }

    return '<div class="screen screen-enter">' +
      topBar(false) +
      '<h2 class="display title-screen">Custom Words</h2>' +
      '<div class="tab-row">' +
        '<button class="tab-btn'+(isWords?' active':'')+'" onclick="IG.setManageTab(\'words\')">Words</button>' +
        '<button class="tab-btn'+(!isWords?' active-teal':'')+'" onclick="IG.setManageTab(\'pairs\')">Word Pairs ✦</button>' +
      '</div>' +
      '<div class="glass-card">'+tabContent+'</div>' +
      (!isWords ? '<p class="subtitle" style="margin-top:14px;font-size:13px;">Word → Imposter\'s Word &nbsp;|&nbsp; Built-in pairs are always included in Similar Mode.</p>' : '') +
    '</div>';
  }

  function renderCustomEmptyWarning(){
    return '<div class="screen screen-center screen-enter text-center">' +
      '<div class="eyebrow" style="text-align:center;">CUSTOM MODE</div>' +
      '<h2 class="display title-screen">No custom words yet</h2>' +
      '<p class="subtitle" style="margin-bottom:30px;">Add at least one word to play Custom Mode.</p>' +
      '<div class="btn-stack">' +
        '<button class="btn btn-primary" onclick="IG.manageWords(\'words\')">Add Custom Words</button>' +
        '<button class="btn btn-secondary" onclick="IG.goHome()">&#8249; Back</button>' +
      '</div>' +
    '</div>';
  }

  function renderSetup(){
    var modeLabel = state.mode==='default' ? 'DEFAULT MODE' : state.mode==='custom' ? 'CUSTOM MODE' : 'SIMILAR WORD MODE';
    var isSimilar = state.mode === 'similar';
    var inner = '';
    if(state.setup.step==='count'){
      inner =
        (isSimilar ? '<div class="info-badge">&#10022; Imposter gets a related but different word</div>' : '') +
        '<div class="field">' +
          '<label for="player-count-input">How many players?</label>' +
          '<input type="number" id="player-count-input" min="3" inputmode="numeric" placeholder="Minimum 3" value="'+escapeHtml(state.setup.count||'')+'" onkeydown="if(event.key===\'Enter\'){IG.setupContinue();}">' +
        '</div>' +
        (state.setup.error ? '<div class="error-text">'+escapeHtml(state.setup.error)+'</div>' : '') +
        '<button class="btn '+(isSimilar?'btn-teal':'btn-primary')+'" onclick="IG.setupContinue()">Continue</button>';
    } else {
      var fields='';
      for(var i=0;i<state.setup.count;i++){
        fields += '<div class="field">' +
          '<label>Player '+(i+1)+' Name</label>' +
          '<input type="text" class="player-name-input'+(state.setup.error?' input-error':'')+'" placeholder="Player '+(i+1)+'" value="'+escapeHtml((state.setup.names&&state.setup.names[i])||'')+'">' +
        '</div>';
      }
      inner = fields +
        (state.setup.error ? '<div class="error-text">'+escapeHtml(state.setup.error)+'</div>' : '') +
        '<div class="btn-stack">' +
          '<button class="btn '+(isSimilar?'btn-teal':'btn-primary')+'" onclick="IG.startGameClick()">Start Game</button>' +
          '<button class="btn-text" onclick="IG.setupEditCount()">Edit Player Count</button>' +
        '</div>';
    }
    return '<div class="screen screen-enter">'+topBar(false)+
      '<div class="eyebrow'+(isSimilar?' teal':'')+'">'+modeLabel+'</div>' +
      '<h2 class="display title-screen">Player Setup</h2>' +
      '<div style="margin-top:18px;">'+inner+'</div>' +
    '</div>';
  }

  function renderDeciding(){
    return '<div class="screen screen-enter">'+topBar(true)+
      '<div class="deciding-wrap">' +
        '<div class="spinner-ring"></div>' +
        '<div class="deciding-label">Choosing the imposter&hellip;</div>' +
      '</div>' +
    '</div>';
  }

  function renderRevealFull(){
    var idx = state.revealOrder[state.revealStep];
    var name = state.players[idx];
    var isImposter = idx === state.imposterIndex;
    var isSimilar = state.mode === 'similar';
    var dots = '';
    for(var i=0;i<state.playerCount;i++){
      var cls='step-dot';
      if(i<state.revealStep) cls+=' done';
      if(i===state.revealStep) cls+=' current';
      dots += '<div class="'+cls+'"></div>';
    }
    var cardHtml, bottomBtns;
    if(!state.revealed){
      cardHtml = '<div class="role-card">' +
        '<div class="pass-icon">&#128241;</div>' +
        '<div class="role-label">Player '+(state.revealStep+1)+' of '+state.playerCount+'</div>' +
        '<h2 class="display title-reveal">Pass to '+escapeHtml(name)+'</h2>' +
        '<p class="role-hint">Make sure no one else can see the screen.</p>' +
      '</div>';
      bottomBtns = '<button class="btn btn-primary" onclick="IG.showRole()">Show My Role</button>';
    } else if(isImposter && isSimilar){
      // Similar mode imposter: show their decoy word + tell them they're imposter
      cardHtml = '<div class="role-card similar-reveal revealed">' +
        '<div class="role-label">'+escapeHtml(name)+' &mdash; YOUR WORD IS</div>' +
        '<div class="role-word teal">'+escapeHtml(state.currentDecoy)+'</div>' +
        '<div class="role-similar-title"></div>' +
        '<p class="role-hint">Your word is close but different. Blend in &mdash; don\'t get caught!</p>' +
      '</div>';
      bottomBtns =
        '<button class="btn-text" onclick="IG.skipWordClick()">Don&rsquo;t like this word? Skip it</button>' +
        '<button class="btn btn-primary" onclick="IG.hideAndPass()">Hide &amp; Pass Phone</button>';
    } else if(isImposter){
      cardHtml = '<div class="role-card imposter-reveal revealed">' +
        '<div class="role-label">'+escapeHtml(name)+'</div>' +
        '<h2 class="role-imposter-title">YOU ARE THE IMPOSTER</h2>' +
        '<p class="role-hint">Blend in. Try to guess the word before they catch you.</p>' +
      '</div>';
      bottomBtns =
        '<button class="btn-text" onclick="IG.skipWordClick()">Don&rsquo;t like this word? Skip it</button>' +
        '<button class="btn btn-primary" onclick="IG.hideAndPass()">Hide &amp; Pass Phone</button>';
    } else {
      cardHtml = '<div class="role-card normal-reveal revealed">' +
        '<div class="role-label">'+escapeHtml(name)+'</div>' +
        '<div class="role-label" style="margin-top:6px;">THE SECRET WORD IS</div>' +
        '<div class="role-word">'+escapeHtml(state.currentWord)+'</div>' +
        '<p class="role-hint">Don&rsquo;t say it out loud.</p>' +
      '</div>';
      bottomBtns =
        '<button class="btn-text" onclick="IG.skipWordClick()">Don&rsquo;t like this word? Skip it</button>' +
        '<button class="btn btn-primary" onclick="IG.hideAndPass()">Hide &amp; Pass Phone</button>';
    }
    var modal = '';
    if(state.showSkipConfirm){
      modal = '<div class="modal-overlay">' +
        '<div class="modal-card">' +
          '<p>Skip this word and restart the round?</p>' +
          '<div class="modal-actions">' +
            '<button class="btn btn-secondary" onclick="IG.confirmSkipNo()">No</button>' +
            '<button class="btn btn-primary" onclick="IG.confirmSkipYes()">Yes</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }
    return '<div class="screen screen-enter">'+topBar(true)+
      cardHtml+
      '<div class="step-dots">'+dots+'</div>' +
      '<div class="spacer-grow"></div>' +
      '<div class="btn-stack" style="margin-top:18px;">'+bottomBtns+'</div>' +
    '</div>' + modal;
  }

  function renderDiscussion(){
    return '<div class="screen screen-center screen-enter text-center">'+topBar(true)+
      '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">' +
        '<div class="eyebrow" style="text-align:center;">EVERYONE HAS SEEN THEIR ROLE</div>' +
        '<h2 class="display" style="font-size:46px;">Discussion Time</h2>' +
        '<p class="subtitle" style="margin-top:10px;margin-bottom:34px;">' +
          (state.mode==='similar'
            ? 'Someone has a different word. Who seems a little&hellip; off?'
            : 'Talk it through. Who doesn\'t know the word?') +
        '</p>' +
        '<button class="btn btn-primary" onclick="IG.revealImposterClick()" style="width:100%;">Reveal Imposter</button>' +
      '</div>' +
    '</div>';
  }

  function renderResult(){
    var imposterName = state.players[state.imposterIndex];
    var isSimilar = state.mode === 'similar';
    var wordCard;
    if(isSimilar){
      wordCard = '<div class="result-card word">' +
        '<div class="result-label">The real word was</div>' +
        '<div class="result-value">'+escapeHtml(state.currentWord)+'</div>' +
        '<hr class="result-divider">' +
        '<div class="result-decoy-label">Imposter\'s word was</div>' +
        '<div class="result-decoy-value">'+escapeHtml(state.currentDecoy)+'</div>' +
      '</div>';
    } else {
      wordCard = '<div class="result-card word">' +
        '<div class="result-label">The word was</div>' +
        '<div class="result-value">'+escapeHtml(state.currentWord)+'</div>' +
      '</div>';
    }
    return '<div class="screen screen-enter">'+topBar(true)+
      '<div class="eyebrow" style="text-align:center;">ROUND '+state.roundNumber+' RESULT</div>' +
      wordCard +
      '<div class="result-card imposter">' +
        '<div class="result-label">The imposter was</div>' +
        '<div class="result-value">'+escapeHtml(imposterName)+'</div>' +
      '</div>' +
      '<div class="spacer-grow"></div>' +
      '<div class="btn-stack" style="margin-top:18px;">' +
        '<button class="btn btn-primary" onclick="IG.nextRoundClick()">Next Round</button>' +
        '<button class="btn-text" onclick="IG.goHome()">&#8249; Back to Home</button>' +
      '</div>' +
    '</div>';
  }

  /* ---- Render dispatcher ---- */
  function render(){
    var app = document.getElementById('app');
    var html;
    switch(state.screen){
      case 'home':               html=renderHome(); break;
      case 'manageWords':        html=renderManageWords(); break;
      case 'customEmptyWarning': html=renderCustomEmptyWarning(); break;
      case 'setup':              html=renderSetup(); break;
      case 'deciding':           html=renderDeciding(); break;
      case 'reveal':             html=renderRevealFull(); break;
      case 'discussion':         html=renderDiscussion(); break;
      case 'result':             html=renderResult(); break;
      default:                   html=renderHome();
    }
    app.innerHTML = html;
    if(state.screen==='setup'&&state.setup.step==='count'){
      var ci=document.getElementById('player-count-input'); if(ci) ci.focus();
    }
    if(state.screen==='manageWords'&&state.manageTab==='words'){
      var nw=document.getElementById('new-word-input'); if(nw&&state.newWordError) nw.focus();
    }
  }

  /* ---- Event delegation ---- */
  document.getElementById('app').addEventListener('click', function(e){
    var rw = e.target.closest('.remove-word-btn');
    if(rw){ removeCustomWord(rw.getAttribute('data-word')); return; }
    var rp = e.target.closest('.remove-pair-btn');
    if(rp){ removeCustomPair(parseInt(rp.getAttribute('data-index'),10)); }
  });

  /* ---- Expose API ---- */
  window.IG = {
    goHome:goHome, playDefaultMode:playDefaultMode, playCustomMode:playCustomMode,
    playSimilarMode:playSimilarMode, manageWords:manageWords, setManageTab:setManageTab,
    addCustomWord:addCustomWord, removeCustomWord:removeCustomWord,
    addCustomPair:addCustomPair, removeCustomPair:removeCustomPair,
    setupContinue:setupContinue, setupEditCount:setupEditCount, startGameClick:startGameClick,
    showRole:showRole, hideAndPass:hideAndPass,
    skipWordClick:skipWordClick, confirmSkipYes:confirmSkipYes, confirmSkipNo:confirmSkipNo,
    revealImposterClick:revealImposterClick, nextRoundClick:nextRoundClick
  };

  render();
})();
</script>
</body>
</html>
